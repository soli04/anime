<!DOCTYPE html>
<html>
<head>
  <title>Anime Recommender</title>
</head>
<body>

<h1>🎌 애니 추천 시스템</h1>

<p>기분을 선택하세요:</p>

<button onclick="recommend('sad')">우울할 때</button>
<button onclick="recommend('action')">액션</button>

<p id="result"></p>

<script>
function recommend(type) {
  let result = "";

  if(type === 'sad') {
    result = "너의 이름은 - 감성 폭발 애니";
  } else if(type === 'action') {
    result = "진격의 거인 - 전투 미친 애니";
  }

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
